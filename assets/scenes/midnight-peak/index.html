<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Midnight Peak</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- layer 0: gradient fallback -->
    <div id="bg-gradient"></div>

    <!-- layer 0: video background -->
    <video id="bg-video" autoplay loop muted playsinline>
        <source src="background.mp4" type="video/mp4">
    </video>

    <!-- layer 0: static image fallback -->
    <img id="bg-image" src="background.png" alt="">

    <!-- layer 1: webgl effects overlay -->
    <canvas id="fx-canvas"></canvas>

    <!-- layer 2: clock widget (centered, draggable) -->
    <div id="clock-widget" class="widget" data-draggable="true">
        <div id="clock-greeting"></div>
        <div id="clock-time">00<span class="clock-sep">:</span>00</div>
        <div id="clock-date"></div>
        <div id="clock-day"></div>
        <div id="clock-custom"></div>
    </div>

    <!-- layer 3: media playing widget (draggable) -->
    <div id="media-widget" class="widget glass-panel hidden" data-draggable="true">
        <img id="media-cover" src="" alt="">
        <div class="media-details">
            <div id="media-title">No Media</div>
            <div id="media-artist">Nothing playing</div>
            <div class="visualizer" id="media-vis">
                <div class="bar"></div><div class="bar"></div>
                <div class="bar"></div><div class="bar"></div>
                <div class="bar"></div>
            </div>
        </div>
    </div>

    <!-- layer 4: system widget (draggable) -->
    <div id="sys-widget" class="widget glass-panel hidden" data-draggable="true">
        <div class="sys-item">
            <span class="sys-label">CPU</span>
            <span class="sys-val" id="sys-cpu">0%</span>
        </div>
        <div class="sys-item">
            <span class="sys-label">RAM</span>
            <span class="sys-val" id="sys-ram">0%</span>
        </div>
    </div>

    <!-- layer 5: calendar widget (draggable) -->
    <div id="cal-widget" class="widget glass-panel" data-draggable="true">
        <div class="cal-header" id="cal-month"></div>
        <div class="cal-grid" id="cal-grid">
            <span class="cal-day-label">Mo</span><span class="cal-day-label">Tu</span>
            <span class="cal-day-label">We</span><span class="cal-day-label">Th</span>
            <span class="cal-day-label">Fr</span><span class="cal-day-label">Sa</span>
            <span class="cal-day-label">Su</span>
        </div>
    </div>

    <!-- scene effects engine -->
    <script src="scene.js"></script>

    <!-- widget logic -->
    <script>
    (function() {
        'use strict';

        // ---- drag system ----
        // works with both native mouse events and the forwarded bridge events
        (function initDrag() {
            var dragging = null;
            var dragOffsetX = 0, dragOffsetY = 0;

            document.addEventListener('mousedown', function(e) {
                // find the draggable widget under cursor
                var el = document.elementFromPoint(e.clientX, e.clientY);
                while (el && el !== document.body) {
                    if (el.getAttribute('data-draggable') === 'true') break;
                    el = el.parentElement;
                }
                if (!el || el === document.body) return;

                // snapshot current visual position
                var rect = el.getBoundingClientRect();
                dragOffsetX = e.clientX - rect.left;
                dragOffsetY = e.clientY - rect.top;

                // convert from css positioning to explicit pixel coords
                el.style.left = rect.left + 'px';
                el.style.top = rect.top + 'px';
                el.style.right = 'auto';
                el.style.bottom = 'auto';
                el.style.transform = 'none';
                el.style.animation = 'none';

                el.classList.add('dragging');
                dragging = el;
            });

            document.addEventListener('mousemove', function(e) {
                if (!dragging) return;
                dragging.style.left = (e.clientX - dragOffsetX) + 'px';
                dragging.style.top = (e.clientY - dragOffsetY) + 'px';
            });

            document.addEventListener('mouseup', function() {
                if (dragging) {
                    dragging.classList.remove('dragging');
                    dragging = null;
                }
            });
        })();

        // ---- clock + greeting ----
        window.__clockProps = { is24h: true, lang: 'en', showGreeting: true };

        var i18n = {
            en: {
                days: ['Sunday','Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'],
                months: ['January','February','March','April','May','June',
                         'July','August','September','October','November','December'],
                greet: ['Good Night','Good Morning','Good Afternoon','Good Evening']
            },
            ru: {
                days: ['\u0412\u043E\u0441\u043A\u0440\u0435\u0441\u0435\u043D\u044C\u0435','\u041F\u043E\u043D\u0435\u0434\u0435\u043B\u044C\u043D\u0438\u043A','\u0412\u0442\u043E\u0440\u043D\u0438\u043A','\u0421\u0440\u0435\u0434\u0430','\u0427\u0435\u0442\u0432\u0435\u0440\u0433','\u041F\u044F\u0442\u043D\u0438\u0446\u0430','\u0421\u0443\u0431\u0431\u043E\u0442\u0430'],
                months: ['\u042F\u043D\u0432\u0430\u0440\u044C','\u0424\u0435\u0432\u0440\u0430\u043B\u044C','\u041C\u0430\u0440\u0442','\u0410\u043F\u0440\u0435\u043B\u044C','\u041C\u0430\u0439','\u0418\u044E\u043D\u044C','\u0418\u044E\u043B\u044C','\u0410\u0432\u0433\u0443\u0441\u0442','\u0421\u0435\u043D\u0442\u044F\u0431\u0440\u044C','\u041E\u043A\u0442\u044F\u0431\u0440\u044C','\u041D\u043E\u044F\u0431\u0440\u044C','\u0414\u0435\u043A\u0430\u0431\u0440\u044C'],
                greet: ['\u0414\u043E\u0431\u0440\u043E\u0439 \u043D\u043E\u0447\u0438','\u0414\u043E\u0431\u0440\u043E\u0435 \u0443\u0442\u0440\u043E','\u0414\u043E\u0431\u0440\u044B\u0439 \u0434\u0435\u043D\u044C','\u0414\u043E\u0431\u0440\u044B\u0439 \u0432\u0435\u0447\u0435\u0440']
            },
            jp: {
                days: ['\u65E5\u66DC\u65E5','\u6708\u66DC\u65E5','\u706B\u66DC\u65E5','\u6C34\u66DC\u65E5','\u6728\u66DC\u65E5','\u91D1\u66DC\u65E5','\u571F\u66DC\u65E5'],
                months: ['1\u6708','2\u6708','3\u6708','4\u6708','5\u6708','6\u6708','7\u6708','8\u6708','9\u6708','10\u6708','11\u6708','12\u6708'],
                greet: ['\u304A\u3084\u3059\u307F','\u304A\u306F\u3088\u3046','\u3053\u3093\u306B\u3061\u306F','\u3053\u3093\u3070\u3093\u306F']
            },
            fr: {
                days: ['Dimanche','Lundi','Mardi','Mercredi','Jeudi','Vendredi','Samedi'],
                months: ['Janvier','F\u00E9vrier','Mars','Avril','Mai','Juin','Juillet','Ao\u00FBt','Septembre','Octobre','Novembre','D\u00E9cembre'],
                greet: ['Bonne nuit','Bonjour','Bon apr\u00E8s-midi','Bonsoir']
            },
            es: {
                days: ['Domingo','Lunes','Martes','Mi\u00E9rcoles','Jueves','Viernes','S\u00E1bado'],
                months: ['Enero','Febrero','Marzo','Abril','Mayo','Junio','Julio','Agosto','Septiembre','Octubre','Noviembre','Diciembre'],
                greet: ['Buenas noches','Buenos d\u00EDas','Buenas tardes','Buenas noches']
            }
        };

        function pad(n) { return n < 10 ? '0' + n : '' + n; }

        function getGreetIndex(h) {
            if (h >= 5 && h < 12) return 1;
            if (h >= 12 && h < 17) return 2;
            if (h >= 17 && h < 21) return 3;
            return 0;
        }

        function tick() {
            var now = new Date();
            var p = window.__clockProps;
            var lang = i18n[p.lang] || i18n.en;
            var h = now.getHours();
            var m = now.getMinutes();
            var suffix = '';

            // greeting
            var greetEl = document.getElementById('clock-greeting');
            if (p.showGreeting && greetEl) {
                greetEl.textContent = lang.greet[getGreetIndex(h)];
                greetEl.style.display = '';
            } else if (greetEl) {
                greetEl.style.display = 'none';
            }

            if (!p.is24h) {
                suffix = h >= 12 ? ' PM' : ' AM';
                h = h % 12 || 12;
            }

            document.getElementById('clock-time').innerHTML =
                pad(h) + '<span class="clock-sep">:</span>' + pad(m) + suffix;

            var day = now.getDate();
            var month = lang.months[now.getMonth()];
            var year = now.getFullYear();

            if (p.lang === 'jp') {
                document.getElementById('clock-date').textContent = year + '\u5E74' + month + day + '\u65E5';
            } else {
                document.getElementById('clock-date').textContent = month + ' ' + day + ', ' + year;
            }
            document.getElementById('clock-day').textContent = lang.days[now.getDay()];
        }

        tick();
        setInterval(tick, 1000);

        // ---- custom text ----
        var customEl = document.getElementById('clock-custom');
        window.__setCustomText = function(text) {
            if (customEl) {
                customEl.textContent = text || '';
                customEl.style.display = text ? '' : 'none';
            }
        };
        window.__setCustomText('');

        // ---- calendar widget ----
        function buildCalendar() {
            var now = new Date();
            var year = now.getFullYear();
            var month = now.getMonth();
            var today = now.getDate();
            var lang = i18n[window.__clockProps.lang] || i18n.en;

            document.getElementById('cal-month').textContent =
                lang.months[month] + ' ' + year;

            var grid = document.getElementById('cal-grid');
            // remove old day cells but keep labels
            var old = grid.querySelectorAll('.cal-day');
            for (var i = 0; i < old.length; i++) old[i].remove();

            // monday = 0 start
            var firstDay = new Date(year, month, 1).getDay();
            firstDay = firstDay === 0 ? 6 : firstDay - 1;
            var daysInMonth = new Date(year, month + 1, 0).getDate();

            for (var e = 0; e < firstDay; e++) {
                var empty = document.createElement('span');
                empty.className = 'cal-day empty';
                grid.appendChild(empty);
            }

            for (var d = 1; d <= daysInMonth; d++) {
                var cell = document.createElement('span');
                cell.className = 'cal-day' + (d === today ? ' today' : '');
                cell.textContent = d;
                grid.appendChild(cell);
            }
        }

        buildCalendar();
        // rebuild calendar at midnight
        setInterval(function() {
            var now = new Date();
            if (now.getHours() === 0 && now.getMinutes() === 0) buildCalendar();
        }, 60000);

        window.__rebuildCalendar = buildCalendar;

        // ---- media widget logic ----
        window.__clockProps.showMedia = true;
        var currentTrackInfo = null;
        var isPlaying = false;

        var elWidget = document.getElementById('media-widget');
        var elCover = document.getElementById('media-cover');
        var elTitle = document.getElementById('media-title');
        var elArtist = document.getElementById('media-artist');
        var elVis = document.getElementById('media-vis');

        window.__updateMediaVisibility = function() {
            var canShow = window.__clockProps.showMedia && currentTrackInfo && isPlaying;
            if (canShow) {
                elWidget.classList.remove('hidden');
                elVis.classList.remove('paused');
                elVis.classList.add('playing');
            } else {
                elWidget.classList.add('hidden');
                elVis.classList.remove('playing');
                elVis.classList.add('paused');
            }
        };

        // ---- system widget logic ----
        window.__clockProps.showSystem = true;
        var elSysWidget = document.getElementById('sys-widget');
        var elCpu = document.getElementById('sys-cpu');
        var elRam = document.getElementById('sys-ram');

        window.__updateSysVisibility = function() {
            if (window.__clockProps.showSystem) {
                elSysWidget.classList.remove('hidden');
            } else {
                elSysWidget.classList.add('hidden');
            }
        };

        window.colorwallSystemInformation = function(data) {
            if (!data) return;
            try {
                if (typeof data === 'string') data = JSON.parse(data);
                if (data.CurrentCpu !== undefined) elCpu.textContent = data.CurrentCpu + '%';
                if (data.CurrentRamAvail !== undefined && data.TotalRam) {
                    var pct = Math.round(((data.TotalRam - data.CurrentRamAvail) / data.TotalRam) * 100);
                    elRam.textContent = pct + '%';
                }
            } catch(e) { console.error('failed to parse system data', e); }
        };

        window.colorwallCurrentTrack = function(data) {
            if (!data || data === 'null') {
                currentTrackInfo = null;
            } else {
                try {
                    if (typeof data === 'string') data = JSON.parse(data);
                    currentTrackInfo = data;
                    elTitle.textContent = data.Title || 'Unknown Track';
                    elArtist.textContent = data.Artist || 'Unknown Artist';
                    if (data.Thumbnail) {
                        elCover.src = data.Thumbnail;
                        elCover.style.display = 'block';
                    } else { elCover.style.display = 'none'; }
                } catch(e) { currentTrackInfo = null; }
            }
            window.__updateMediaVisibility();
        };

        window.colorwallWallpaperPlaybackChanged = function(state) {
            if (typeof state === 'string') { try { state = JSON.parse(state); } catch(e){} }
            isPlaying = state && state.IsPaused === false;
            window.__updateMediaVisibility();
        };

        // ---- calendar visibility ----
        window.__clockProps.showCalendar = true;
        window.__updateCalVisibility = function() {
            var el = document.getElementById('cal-widget');
            if (el) el.classList.toggle('hidden', !window.__clockProps.showCalendar);
        };

        // initialize
        window.__updateMediaVisibility();
        window.__updateSysVisibility();
        window.__updateCalVisibility();
    })();
    </script>
</body>
</html>

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 1200 720" font-family="'Segoe UI', system-ui, sans-serif">
  <defs>
    <marker id="arrow" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#8b949e"/>
    </marker>
    <marker id="arrow-cyan" viewBox="0 0 10 7" refX="10" refY="3.5" markerWidth="8" markerHeight="6" orient="auto-start-reverse">
      <polygon points="0 0, 10 3.5, 0 7" fill="#58a6ff"/>
    </marker>
  </defs>

  <!-- background -->
  <rect width="1200" height="720" rx="12" fill="#0d1117"/>

  <!-- ═══════════════ AI GENERATION SUBGRAPH ═══════════════ -->
  <rect x="30" y="20" width="340" height="340" rx="8" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="200" y="44" fill="#58a6ff" font-size="13" font-weight="600" text-anchor="middle">AI Generation</text>

  <!-- user prompt -->
  <rect x="130" y="60" width="140" height="36" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="200" y="83" fill="#c9d1d9" font-size="11" text-anchor="middle">User Prompt</text>

  <!-- foundryiq agent -->
  <rect x="110" y="116" width="180" height="36" rx="16" fill="#161b22" stroke="#30363d"/>
  <text x="200" y="139" fill="#c9d1d9" font-size="11" text-anchor="middle">FoundryIQ Agent</text>

  <!-- generate html/css/js -->
  <rect x="105" y="172" width="190" height="36" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="200" y="195" fill="#c9d1d9" font-size="11" text-anchor="middle">Generate HTML / CSS / JS</text>

  <!-- save to local -->
  <rect x="110" y="228" width="180" height="36" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="200" y="251" fill="#c9d1d9" font-size="11" text-anchor="middle">Save to Local Collection</text>

  <!-- aggregator -->
  <rect x="90" y="284" width="220" height="36" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="200" y="307" fill="#c9d1d9" font-size="11" text-anchor="middle">Aggregator: Fetch 4K MP4</text>

  <!-- inject video -->
  <rect x="105" y="332" width="190" height="22" rx="6" fill="none" stroke="none"/>

  <!-- ai generation arrows -->
  <line x1="200" y1="96" x2="200" y2="116" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="270" y="110" fill="#8b949e" font-size="9" font-style="italic">Natural Language</text>
  <line x1="200" y1="152" x2="200" y2="172" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="270" y="166" fill="#8b949e" font-size="9" font-style="italic">Grounded via CW-API KB</text>
  <line x1="200" y1="208" x2="200" y2="228" stroke="#8b949e" marker-end="url(#arrow)"/>
  <line x1="200" y1="264" x2="200" y2="284" stroke="#8b949e" marker-end="url(#arrow)"/>

  <!-- ═══════════════ SHELL INJECTION SUBGRAPH ═══════════════ -->
  <rect x="400" y="20" width="370" height="340" rx="8" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="585" y="44" fill="#58a6ff" font-size="13" font-weight="600" text-anchor="middle">Shell Injection</text>

  <!-- rust backend -->
  <rect x="490" y="60" width="190" height="36" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="585" y="83" fill="#c9d1d9" font-size="11" text-anchor="middle">Rust Backend</text>

  <!-- shell enumeration -->
  <rect x="490" y="120" width="190" height="36" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="585" y="143" fill="#c9d1d9" font-size="11" text-anchor="middle">Shell Enumeration</text>

  <!-- shelldll defview diamond -->
  <polygon points="585,185 650,210 585,235 520,210" fill="#161b22" stroke="#30363d"/>
  <text x="585" y="214" fill="#c9d1d9" font-size="10" text-anchor="middle">SHELLDLL_DefView?</text>

  <!-- target workerw -->
  <rect x="460" y="258" width="250" height="36" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="585" y="281" fill="#c9d1d9" font-size="11" text-anchor="middle">Target WorkerW after DefView parent</text>

  <!-- setparent webview2 -->
  <rect x="470" y="318" width="230" height="36" rx="6" fill="#161b22" stroke="#58a6ff" stroke-width="1.5"/>
  <text x="585" y="341" fill="#58a6ff" font-size="11" font-weight="600" text-anchor="middle">SetParent Webview2 into WorkerW</text>

  <!-- shell injection arrows -->
  <line x1="585" y1="96" x2="585" y2="120" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="605" y="112" fill="#8b949e" font-size="8" font-style="italic">SendMessage 0x052C</text>
  <line x1="585" y1="156" x2="585" y2="185" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="610" y="174" fill="#8b949e" font-size="8" font-style="italic">Enumerate WorkerW</text>
  <line x1="585" y1="235" x2="585" y2="258" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="535" y="250" fill="#7ee787" font-size="8" font-style="italic">Found</text>
  <line x1="585" y1="294" x2="585" y2="318" stroke="#8b949e" marker-end="url(#arrow)"/>

  <!-- arrow from AI gen to shell injection (aggregator → setparent) -->
  <path d="M 310 302 L 470 336" fill="none" stroke="#58a6ff" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)"/>

  <!-- ═══════════════ DATA FORWARDERS SUBGRAPH ═══════════════ -->
  <rect x="30" y="390" width="540" height="310" rx="8" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="300" y="414" fill="#58a6ff" font-size="13" font-weight="600" text-anchor="middle">Data Forwarders</text>

  <!-- audio row -->
  <rect x="50" y="434" width="170" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="135" y="455" fill="#c9d1d9" font-size="10" text-anchor="middle">WASAPI Loopback</text>
  <rect x="320" y="434" width="230" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="435" y="455" fill="#c9d1d9" font-size="10" text-anchor="middle">colorwallAudioListener()</text>
  <line x1="220" y1="451" x2="320" y2="451" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="245" y="444" fill="#8b949e" font-size="7.5" font-style="italic">128 bands · 2048-pt FFT · Hann</text>

  <!-- mouse row -->
  <rect x="50" y="486" width="170" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="135" y="507" fill="#c9d1d9" font-size="10" text-anchor="middle">Win32 GetCursorPos</text>
  <rect x="320" y="486" width="230" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="435" y="507" fill="#c9d1d9" font-size="10" text-anchor="middle">Synthetic Mouse/Pointer Events</text>
  <line x1="220" y1="503" x2="320" y2="503" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="244" y="496" fill="#8b949e" font-size="7.5" font-style="italic">Screen → viewport coords</text>

  <!-- media row -->
  <rect x="50" y="538" width="170" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="135" y="556" fill="#c9d1d9" font-size="9" text-anchor="middle">GlobalSystemMedia</text>
  <text x="135" y="567" fill="#c9d1d9" font-size="9" text-anchor="middle">TransportControls</text>
  <rect x="320" y="538" width="230" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="435" y="559" fill="#c9d1d9" font-size="10" text-anchor="middle">colorwallCurrentTrack()</text>
  <line x1="220" y1="555" x2="320" y2="555" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="244" y="548" fill="#8b949e" font-size="7.5" font-style="italic">Title · Artist · Thumbnail</text>

  <!-- system row -->
  <rect x="50" y="590" width="170" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="135" y="611" fill="#c9d1d9" font-size="10" text-anchor="middle">sysinfo crate</text>
  <rect x="320" y="590" width="230" height="34" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="435" y="611" fill="#c9d1d9" font-size="10" text-anchor="middle">colorwallSystemInformation()</text>
  <line x1="220" y1="607" x2="320" y2="607" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="248" y="600" fill="#8b949e" font-size="7.5" font-style="italic">CPU · RAM · Network</text>

  <!-- ═══════════════ RENDERING SUBGRAPH ═══════════════ -->
  <rect x="600" y="390" width="570" height="310" rx="8" fill="none" stroke="#30363d" stroke-width="1.5"/>
  <text x="885" y="414" fill="#58a6ff" font-size="13" font-weight="600" text-anchor="middle">Rendering</text>

  <!-- interactive wallpaper webview -->
  <rect x="700" y="440" width="240" height="40" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="820" y="465" fill="#c9d1d9" font-size="11" text-anchor="middle">Interactive Wallpaper Webview</text>

  <!-- widget host webview -->
  <rect x="700" y="500" width="240" height="40" rx="6" fill="#161b22" stroke="#30363d"/>
  <text x="820" y="525" fill="#c9d1d9" font-size="11" text-anchor="middle">Widget Host Webview</text>

  <!-- live desktop circle -->
  <ellipse cx="820" cy="630" rx="80" ry="30" fill="#161b22" stroke="#7ee787" stroke-width="1.5"/>
  <text x="820" y="635" fill="#7ee787" font-size="12" font-weight="600" text-anchor="middle">Live Desktop</text>

  <!-- rendering arrows -->
  <line x1="820" y1="480" x2="820" y2="500" stroke="#8b949e" stroke-dasharray="3,2"/>
  <line x1="820" y1="540" x2="820" y2="600" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="840" y="572" fill="#8b949e" font-size="8" font-style="italic">Rendered behind icons</text>

  <!-- arrow from interactive to live desktop -->
  <path d="M 780 480 Q 740 570 760 600" fill="none" stroke="#8b949e" marker-end="url(#arrow)"/>
  <text x="710" y="558" fill="#8b949e" font-size="8" font-style="italic">Click-through</text>

  <!-- setparent → both webviews -->
  <path d="M 700 336 L 700 460" fill="none" stroke="#58a6ff" stroke-dasharray="4,3" marker-end="url(#arrow-cyan)"/>
  <path d="M 700 336 Q 680 420 700 500" fill="none" stroke="#58a6ff" stroke-dasharray="4,3"/>

  <!-- data forwarders → webviews -->
  <!-- audio → both -->
  <line x1="550" y1="451" x2="700" y2="455" stroke="#8b949e" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <line x1="550" y1="451" x2="700" y2="515" stroke="#8b949e" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- mouse → both -->
  <line x1="550" y1="503" x2="700" y2="465" stroke="#8b949e" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <line x1="550" y1="503" x2="700" y2="520" stroke="#8b949e" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- media → both -->
  <line x1="550" y1="555" x2="700" y2="470" stroke="#8b949e" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <line x1="550" y1="555" x2="700" y2="525" stroke="#8b949e" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- system → both -->
  <line x1="550" y1="607" x2="700" y2="475" stroke="#8b949e" stroke-dasharray="3,2" marker-end="url(#arrow)"/>
  <line x1="550" y1="607" x2="700" y2="530" stroke="#8b949e" stroke-dasharray="3,2" marker-end="url(#arrow)"/>

  <!-- subtle watermark -->
  <text x="1170" y="710" fill="#30363d" font-size="9" text-anchor="end">ColorWall Architecture</text>
</svg>
